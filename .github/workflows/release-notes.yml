# Release notes on staging -> main promotion PRs.
#
# Triggered on PRs targeting `main`. Posts a single comment summarising
# the cumulative impact: commits since last main merge, files changed by
# surface, and migrations added. Carl reviews this comment before merging
# the release PR.
#
# Only fires when base == main. PRs into staging (the normal feature flow)
# don't trigger this.

name: Release notes

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
    branches:
      - main

permissions:
  pull-requests: write
  contents: read

jobs:
  release-notes:
    name: Compose release notes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compose summary
        id: compose
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail

          # Diff range: base...head (only HEAD-side commits).
          range="${BASE_SHA}...${HEAD_SHA}"

          # Counts per surface.
          web_portal=$(git diff --name-only "${range}" -- 'web-portal/**' | wc -l | tr -d ' ')
          web_player=$(git diff --name-only "${range}" -- 'web-player/**' | wc -l | tr -d ' ')
          app=$(git diff --name-only "${range}" -- 'app/**' | wc -l | tr -d ' ')
          supabase=$(git diff --name-only "${range}" -- 'supabase/**' | wc -l | tr -d ' ')
          docs=$(git diff --name-only "${range}" -- 'docs/**' | wc -l | tr -d ' ')
          other=$(git diff --name-only "${range}" \
            | grep -vE '^(web-portal/|web-player/|app/|supabase/|docs/)' | wc -l | tr -d ' ')

          migrations=$(git diff --name-only --diff-filter=A "${range}" \
            -- 'supabase/migrations/*.sql' || true)

          # Commit list (subject lines only, newest first).
          commits=$(git log --pretty='format:- %h %s' "${range}")

          # Compose markdown. Use a heredoc with EOF terminator written to
          # the GITHUB_OUTPUT delimiter format.
          {
            echo 'body<<RELEASE_NOTES_EOF'
            echo '## Release-train summary'
            echo ''
            echo 'Cumulative changes from `staging` headed for `main`:'
            echo ''
            echo '| Surface | Files changed |'
            echo '|---------|---------------|'
            echo "| web-portal     | ${web_portal} |"
            echo "| web-player     | ${web_player} |"
            echo "| app (Flutter)  | ${app} |"
            echo "| supabase       | ${supabase} |"
            echo "| docs           | ${docs} |"
            echo "| other          | ${other} |"
            echo ''
            if [[ -n "${migrations}" ]]; then
              echo '### New migrations'
              echo ''
              while IFS= read -r m; do
                [[ -z "${m}" ]] && continue
                echo "- \`${m}\`"
              done <<< "${migrations}"
              echo ''
              echo 'Pre-flight: `scripts/ci/check-migration-column-preservation.sh` flags any `CREATE OR REPLACE FUNCTION ... RETURNS TABLE` for review.'
              echo ''
            else
              echo '_No new migrations in this release._'
              echo ''
            fi
            echo '### Commits'
            echo ''
            echo "${commits}"
            echo ''
            echo '---'
            echo '_Generated by `.github/workflows/release-notes.yml`. See docs/CI.md §6 (Promotion) and §10 (Automation)._'
            echo 'RELEASE_NOTES_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Upsert PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const marker = "<!-- release-notes-bot -->";
            const body = marker + "\n" + `${{ steps.compose.outputs.body }}`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });
            const existing = comments.find(c => c.body && c.body.startsWith(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body
              });
            }
