# CI for homefit.studio.
# Runs on every push (any branch) and every pull request.
#
# Jobs:
#   data-access-seams   - tools/enforce_data_access_seams.py (Python, richer)
#   custom-rules        - scripts/ci/*.sh (bash; brief-shape lightweight gate)
#   flutter-app         - flutter pub get + analyze + test
#   flutter-build-ios   - flutter build ios (gated to PRs touching app/**)
#   web-portal          - npm ci + lint + typecheck + build (catches build errors)
#   web-player          - node --check on each static *.js file
#
# Concurrency: per-ref group so a new push cancels in-flight runs on the
# same branch and prod stays cheap.
#
# See docs/CI.md §10 for the full rationale and how to add a new check.

name: CI

on:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  data-access-seams:
    name: Data access seams (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Enforce Supabase seam boundaries
        run: python3 tools/enforce_data_access_seams.py

  custom-rules:
    name: Custom rules (bash)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: No direct DB access
        run: scripts/ci/check-no-direct-db-access.sh
      - name: Migration column-preservation nudge
        run: scripts/ci/check-migration-column-preservation.sh
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref || 'origin/main' }}

  flutter-app:
    name: Flutter app (analyze + test)
    runs-on: ubuntu-latest
    needs: data-access-seams
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: stable
          cache: true
      - name: flutter pub get
        working-directory: app
        run: flutter pub get
      - name: flutter analyze
        working-directory: app
        run: flutter analyze
      - name: flutter test
        working-directory: app
        run: flutter test

  detect-app-changes:
    name: Detect app/** changes
    runs-on: ubuntu-latest
    outputs:
      app_changed: ${{ steps.changes.outputs.app_changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Compute diff
        id: changes
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"
          else
            base="${{ github.event.before }}"
            head="${{ github.sha }}"
          fi
          # First-push case (branch just created, push event has all-zeros
          # `before`): fall back to comparing against origin/main so we
          # don't blindly assume app changes and burn macOS runner minutes.
          # Only force-true if we truly can't determine a comparison base.
          if [[ -z "${base}" || "${base}" == "0000000000000000000000000000000000000000" ]]; then
            git fetch --depth=50 origin main >/dev/null 2>&1 || true
            base="$(git merge-base HEAD origin/main 2>/dev/null || echo '')"
          fi
          if [[ -z "${base}" ]]; then
            # Truly can't determine — default to running iOS build (safer).
            echo "app_changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if git diff --name-only "${base}...${head}" -- 'app/**' | grep -q .; then
            echo "app_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "app_changed=false" >> "$GITHUB_OUTPUT"
          fi

  flutter-build-ios:
    name: Flutter build iOS (debug, no codesign)
    runs-on: macos-latest
    needs:
      - flutter-app
      - detect-app-changes
    # Gate the whole job — macOS minutes are expensive, so we skip
    # entirely (no runner provisioning) when no app/** files changed.
    if: needs.detect-app-changes.outputs.app_changed == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: stable
          cache: true
      - name: flutter pub get
        working-directory: app
        run: flutter pub get
      - name: flutter build ios (debug, no codesign)
        working-directory: app
        run: |
          GIT_SHA=$(git rev-parse --short HEAD)
          flutter build ios --debug --no-codesign \
            --dart-define=GIT_SHA="${GIT_SHA}"

  web-portal:
    name: Web portal (lint + typecheck + build)
    runs-on: ubuntu-latest
    needs: data-access-seams
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web-portal/package-lock.json
      - name: npm ci
        working-directory: web-portal
        run: npm ci
      - name: npm run lint
        working-directory: web-portal
        run: npm run lint
      - name: npm run typecheck
        working-directory: web-portal
        run: npm run typecheck
      - name: npm run build
        working-directory: web-portal
        env:
          # Build needs these to exist. Use placeholders so the build pipeline
          # is exercised; the real values come from Vercel env at deploy time.
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
          APP_URL: https://placeholder.example.com
        run: npm run build

  web-player:
    name: Web player (node --check)
    runs-on: ubuntu-latest
    needs: data-access-seams
    steps:
      - uses: actions/checkout@v4
      - name: node --check on web-player/*.js
        run: |
          for f in web-player/*.js; do
            node --check "$f"
          done
