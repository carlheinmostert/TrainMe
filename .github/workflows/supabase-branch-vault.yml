# Populate vault secrets on Supabase preview branch DBs.
#
# Supabase Branching auto-spins an ephemeral DB for every feature PR. The
# baseline migration applies cleanly, BUT vault.secrets is empty on a fresh
# branch — and `public.sign_storage_url` reads `supabase_jwt_secret` +
# `supabase_url` from vault. Without those rows, the function returns NULL
# and consent-gated raw-archive videos won't play on the preview surface.
#
# This workflow plugs the gap:
#   1. Wait for the branch matching this PR's head ref to reach
#      ACTIVE_HEALTHY status (Supabase Branching is async; the branch is
#      created shortly after the PR opens but may take a minute or two to
#      become available).
#   2. Retrieve the branch's `jwt_secret` + project ref via the Management
#      API.
#   3. Insert both into `vault.secrets` via the Management API's
#      `database/query` endpoint, guarded by NOT EXISTS so re-runs of the
#      same PR's CI don't double-insert.
#
# This workflow NEVER fails the overall PR. If the branch isn't ready in
# time, or the API misbehaves, we emit a `::warning::` and exit 0 — the
# PR's other checks still gate merge. A failed vault population just means
# raw-archive treatments fall back to line-drawing on that preview, which
# is the same graceful behaviour `sign_storage_url` already implements.
#
# Skips:
#   - `staging` / `main` branches (persistent envs; vault already populated).
#   - Release PRs from `staging` → `main` (no new branch DB is created).
#   - Ephemeral agent worktree branches (`claude/*`, `worktree-agent/*`) —
#     those don't get a Supabase branch DB anyway.
#
# Required secret:
#   SUPABASE_ACCESS_TOKEN — Personal Access Token with project scope.
#   Generated from https://supabase.com/dashboard/account/tokens. Set as a
#   repo secret under Settings → Secrets and variables → Actions.

name: Supabase branch vault setup

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize

# Per-ref + cancel-in-progress: a re-push during a poll doesn't pile up
# extra waiters. The newest run wins.
concurrency:
  group: supabase-branch-vault-${{ github.event.pull_request.head.ref }}
  cancel-in-progress: true

jobs:
  populate-vault:
    name: Populate vault.secrets on preview branch DB
    runs-on: ubuntu-latest

    # Skip persistent branches + ephemeral agent worktrees. Anything else
    # is a feature branch that should have a Supabase preview DB.
    if: >-
      github.event.pull_request.head.ref != 'staging' &&
      github.event.pull_request.head.ref != 'main' &&
      !startsWith(github.event.pull_request.head.ref, 'claude/') &&
      !startsWith(github.event.pull_request.head.ref, 'worktree-agent')

    env:
      # Prod project ref — Supabase Branching is enabled on this project,
      # and branch DBs are children of it.
      PROJECT_REF: yrwcofhovrcydootivjx
      BRANCH_NAME: ${{ github.event.pull_request.head.ref }}
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      # Persistent branches that already have vault populated — never write
      # to these even if the PR head ref somehow matches.
      PERSISTENT_BRANCHES: "staging main"

    steps:
      - name: Guard — SUPABASE_ACCESS_TOKEN must be set
        run: |
          set -euo pipefail
          if [[ -z "${SUPABASE_ACCESS_TOKEN:-}" ]]; then
            echo "::warning::SUPABASE_ACCESS_TOKEN secret is not set. Skipping vault population."
            echo "::warning::Carl: generate a PAT at https://supabase.com/dashboard/account/tokens and add as repo secret."
            echo "SKIP=true" >> "$GITHUB_ENV"
            exit 0
          fi
          echo "SKIP=false" >> "$GITHUB_ENV"

      - name: Wait for Supabase branch to reach ACTIVE_HEALTHY
        id: wait
        if: env.SKIP == 'false'
        run: |
          set -euo pipefail

          # Poll the branches list until a branch whose `git_branch` matches
          # this PR's head ref is ACTIVE_HEALTHY. Supabase Branching takes
          # 30-180s to provision; we give it 10 minutes before giving up.
          deadline=$(( SECONDS + 600 ))
          branch_id=""
          status=""

          while (( SECONDS < deadline )); do
            response="$(
              curl -fsS \
                -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" \
                "https://api.supabase.com/v1/projects/${PROJECT_REF}/branches" \
                || echo "[]"
            )"

            # Match on git_branch == BRANCH_NAME. jq -e returns non-zero if
            # the filter produced no output; absorb that.
            branch_id="$(
              echo "${response}" \
                | jq -r --arg ref "${BRANCH_NAME}" \
                    '.[] | select(.git_branch == $ref) | .id' \
                | head -n 1
            )"

            if [[ -n "${branch_id}" ]]; then
              status="$(
                echo "${response}" \
                  | jq -r --arg ref "${BRANCH_NAME}" \
                      '.[] | select(.git_branch == $ref) | .status' \
                  | head -n 1
              )"
              echo "Branch found: id=${branch_id} status=${status}"
              if [[ "${status}" == "ACTIVE_HEALTHY" ]]; then
                echo "branch_id=${branch_id}" >> "$GITHUB_OUTPUT"
                echo "status=ready" >> "$GITHUB_OUTPUT"
                exit 0
              fi
            else
              echo "Branch '${BRANCH_NAME}' not yet listed by Supabase. Retrying..."
            fi

            sleep 15
          done

          # Timeout — emit warning, do not fail the workflow.
          echo "::warning::Supabase branch for '${BRANCH_NAME}' did not reach ACTIVE_HEALTHY within 10 minutes (last seen status: ${status:-not-found}). Vault secrets NOT populated. Preview will fall back to line-drawing only for consent-gated treatments. Re-run this workflow once the branch is ready, or populate vault manually."
          echo "status=timeout" >> "$GITHUB_OUTPUT"

      - name: Fetch branch credentials
        id: creds
        if: env.SKIP == 'false' && steps.wait.outputs.status == 'ready'
        env:
          BRANCH_ID: ${{ steps.wait.outputs.branch_id }}
        run: |
          set -euo pipefail

          # Branch detail endpoint returns `jwt_secret` + project-ref-style
          # identifiers we need to build the supabase_url value.
          detail="$(
            curl -fsS \
              -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" \
              "https://api.supabase.com/v1/branches/${BRANCH_ID}"
          )"

          # `ref` is the branch's project-ref (e.g. abcd1234efgh5678ijkl).
          # `jwt_secret` is the per-branch JWT signing secret.
          branch_ref="$(echo "${detail}" | jq -r '.ref // empty')"
          jwt_secret="$(echo "${detail}" | jq -r '.jwt_secret // empty')"

          if [[ -z "${branch_ref}" || -z "${jwt_secret}" ]]; then
            echo "::warning::Branch detail missing ref or jwt_secret. Skipping vault population."
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          supabase_url="https://${branch_ref}.supabase.co"
          echo "Resolved branch_ref=${branch_ref}"
          echo "Resolved supabase_url=${supabase_url}"
          # Do NOT echo the JWT secret. Mask it for any future log output too.
          echo "::add-mask::${jwt_secret}"

          # Pass downstream via env so we never write the secret to disk.
          {
            echo "BRANCH_SUPABASE_URL=${supabase_url}"
            echo "BRANCH_JWT_SECRET=${jwt_secret}"
          } >> "$GITHUB_ENV"
          echo "status=ready" >> "$GITHUB_OUTPUT"

      - name: Insert vault secrets (idempotent)
        if: env.SKIP == 'false' && steps.wait.outputs.status == 'ready' && steps.creds.outputs.status == 'ready'
        env:
          BRANCH_ID: ${{ steps.wait.outputs.branch_id }}
        run: |
          set -euo pipefail

          # Both inserts are guarded by NOT EXISTS so re-running the workflow
          # on a synchronize event is a no-op. We use `vault.create_secret`
          # rather than a raw INSERT so encryption/keying matches Supabase's
          # own UI-driven path.
          #
          # `database/query` accepts a single SQL string. We submit one
          # statement at a time to keep the response parseable + the failure
          # mode obvious. The literal value gets passed in via jq's `--arg`
          # so any apostrophes / dollar signs in the secret never break out
          # of the SQL string at JSON-encode time, and we wrap it in a
          # randomly-tagged Postgres dollar-quote so it also survives the
          # SQL parser without further escaping.
          #
          # We pick a tag that's vanishingly unlikely to appear inside a
          # JWT or URL ("vbv" for "vault branch vault"). If it ever did,
          # Postgres would reject the SQL and we'd see a `::warning::`.

          DOLLAR_TAG="vbv$$"

          run_insert_secret() {
            local secret_name="$1"
            local secret_value="$2"

            # Build SQL with the secret embedded inside $vbv$...$vbv$ tags.
            local sql
            sql="$(
              printf 'DO $do$ BEGIN IF NOT EXISTS (SELECT 1 FROM vault.secrets WHERE name = %s) THEN PERFORM vault.create_secret($%s$%s$%s$, %s, %s); END IF; END $do$;' \
                "'${secret_name}'" \
                "${DOLLAR_TAG}" "${secret_value}" "${DOLLAR_TAG}" \
                "'${secret_name}'" \
                "'Set by .github/workflows/supabase-branch-vault.yml'"
            )"

            local payload
            payload="$(jq -nc --arg q "${sql}" '{query: $q}')"

            local response
            response="$(
              curl -fsS -X POST \
                -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" \
                -H "Content-Type: application/json" \
                --data "${payload}" \
                "https://api.supabase.com/v1/branches/${BRANCH_ID}/database/query" \
                || echo '{"error":"curl-failed"}'
            )"

            # Truncate response to 200 chars in logs. We never echo `sql`
            # or `payload` directly — those contain the secret in plain text.
            echo "${secret_name}: $(echo "${response}" | head -c 200)"

            if echo "${response}" | grep -qiE '"(error|message)"[[:space:]]*:'; then
              echo "::warning::Vault insert for '${secret_name}' returned an error from Supabase Management API. Vault may not be populated for this branch."
            fi
          }

          run_insert_secret "supabase_url" "${BRANCH_SUPABASE_URL}"
          run_insert_secret "supabase_jwt_secret" "${BRANCH_JWT_SECRET}"

          echo ""
          echo "Vault secrets populated (or already present) on branch ${BRANCH_ID}."

      - name: Verify via signed_url_self_check
        if: env.SKIP == 'false' && steps.wait.outputs.status == 'ready' && steps.creds.outputs.status == 'ready'
        env:
          BRANCH_ID: ${{ steps.wait.outputs.branch_id }}
        run: |
          set -euo pipefail

          # Call the SECURITY DEFINER probe shipped with the baseline. If
          # both secrets are present + signing works, ok=true.
          payload='{"query":"SELECT jwt_secret_present, supabase_url_present, ok FROM public.signed_url_self_check();"}'
          response="$(
            curl -fsS -X POST \
              -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" \
              -H "Content-Type: application/json" \
              --data "${payload}" \
              "https://api.supabase.com/v1/branches/${BRANCH_ID}/database/query" \
              || echo '[]'
          )"
          echo "self-check: ${response}"

          # Don't fail on parse mismatch — informational only.
          if echo "${response}" | grep -q '"ok":true'; then
            echo ""
            echo "Self-check OK — sign_storage_url is wired correctly on this branch."
          else
            echo "::warning::signed_url_self_check did not return ok=true. Treatments may fall back to line-drawing only. Inspect the response above."
          fi
