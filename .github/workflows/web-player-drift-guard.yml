name: Web Player Drift Guard

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  web-player-drift-guard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify mirrored web-player bundle
        run: python3 tools/check_web_player_drift.py
