name: raidme
description: "Exercise plan capture and sharing for biokineticists"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Camera & media
  camera: ^0.11.1
  image_picker: ^1.1.2

  # Image/video processing
  opencv_dart: ^2.2.1
  image: ^4.5.3

  # Video
  video_player: ^2.9.6
  video_thumbnail: ^0.5.3

  # Local storage
  sqflite: ^2.4.2
  path_provider: ^2.1.5
  path: ^1.9.1

  # Supabase (for Send flow — Phase 3)
  supabase_flutter: ^2.9.0

  # Native sign-in SDKs (iOS-only for MVP). Supabase accepts the native
  # idToken via signInWithIdToken, bypassing the browser-based OAuth flow
  # that proved fragile on iOS 17+ (ASWebAuthenticationSession friction,
  # SFSafariViewController blank pages, externalApplication "Open in app?"
  # prompts).
  # Pinned to 6.x: v7 auto-adds a nonce claim to id_tokens that the
  # Flutter-side API doesn't let us introspect, so Supabase rejects
  # with "Passed nonce and nonce in id_token should either both exist
  # or not." v6 doesn't inject a nonce and matches Supabase's canonical
  # native-sign-in example verbatim.
  google_sign_in: ^6.2.2
  sign_in_with_apple: ^7.0.1

  # UI
  google_fonts: ^6.1.0
  share_plus: ^10.1.4
  url_launcher: ^6.3.1
  reorderable_grid: ^1.0.13
  uuid: ^4.5.1

  # Wave 11 — QR renderer for the PNG share card (client-side
  # RepaintBoundary raster). Pure Dart, no native deps; draws the QR
  # matrix into a Canvas so it composes directly into the card widget
  # tree that gets snapshotted via RepaintBoundary.toImage().
  qr_flutter: ^4.1.0

  # Persistence for lightweight preferences that survive app restarts
  # (e.g. which practice the practitioner last chose when they belong to
  # more than one). Already installed transitively via iOS pods — the
  # explicit declaration here makes the Dart-side dep discoverable.
  shared_preferences: ^2.3.3

  # Offline-first foundation. SyncService subscribes to
  # `onConnectivityChanged` so the pending-op queue drains the moment
  # the device regains network. If the plugin ever fails to initialise
  # (simulator oddity, plugin registration quirk) the service treats
  # the device as online-optimistic — RPC calls fail normally and
  # retry on the next boot. No feature regressions if this package is
  # unavailable.
  connectivity_plus: ^6.1.3

  # Wave 4 Phase 1 — Unified player prototype.
  # Embeds the web-player bundle (HTML/CSS/JS) in a Flutter WebView that
  # loads from a loopback Dart HTTP server (shelf) serving the bundled
  # assets + plan JSON + local archived video files. Prototype only —
  # the existing native PlanPreviewScreen is unchanged; this lets us A/B
  # the unified player side-by-side before cutting the native one.
  # See app/lib/services/local_player_server.dart + app/lib/screens/unified_preview_screen.dart.
  webview_flutter: ^4.10.0
  # Pulled in transitively by webview_flutter, but we import its
  # PlaybackMediaTypes + WebKitWebViewControllerCreationParams directly
  # in unified_preview_screen.dart to enable inline media playback and
  # autoplay on iOS. Declaring it keeps `depend_on_referenced_packages`
  # lint green.
  webview_flutter_wkwebview: ^3.24.0
  shelf: ^1.4.1
  shelf_static: ^1.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  # Wave 18 — in-memory sqflite for host tests (publish_dirty_state_test).
  # The production path runs against iOS sqflite; the ffi variant is used
  # only under `flutter test` on the host Mac.
  sqflite_common_ffi: ^2.3.0

flutter:
  uses-material-design: true

  # Wave 4 Phase 1 — embedded web-player bundle served by LocalPlayerServer.
  # Keep the listed files tight so we don't accidentally bundle sw.js, the
  # Vercel middleware, or other server-side artefacts. Regenerate via
  # `cd app && dart run tool/sync_web_player_bundle.dart` when web-player/
  # changes (the helper script lives alongside this pubspec and is how a
  # future tooling step can rsync rather than commit). For Phase 1 the
  # copy lives in the repo — generated files stay in .gitignore so a future
  # build step can re-derive them.
  assets:
    - assets/web-player/index.html
    - assets/web-player/app.js
    - assets/web-player/api.js
    - assets/web-player/styles.css
