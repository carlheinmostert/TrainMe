name: raidme
description: "Exercise plan capture and sharing for biokineticists"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Camera & media
  camera: ^0.11.1
  image_picker: ^1.1.2

  # Image/video processing
  opencv_dart: ^2.2.1
  image: ^4.5.3

  # Video
  video_player: ^2.9.6
  video_thumbnail: ^0.5.3

  # Local storage
  sqflite: ^2.4.2
  path_provider: ^2.1.5
  path: ^1.9.1

  # Supabase (for Send flow — Phase 3)
  supabase_flutter: ^2.9.0

  # Native sign-in SDKs (iOS-only for MVP). Supabase accepts the native
  # idToken via signInWithIdToken, bypassing the browser-based OAuth flow
  # that proved fragile on iOS 17+ (ASWebAuthenticationSession friction,
  # SFSafariViewController blank pages, externalApplication "Open in app?"
  # prompts).
  # Pinned to 6.x: v7 auto-adds a nonce claim to id_tokens that the
  # Flutter-side API doesn't let us introspect, so Supabase rejects
  # with "Passed nonce and nonce in id_token should either both exist
  # or not." v6 doesn't inject a nonce and matches Supabase's canonical
  # native-sign-in example verbatim.
  google_sign_in: ^6.2.2
  sign_in_with_apple: ^7.0.1

  # UI
  google_fonts: ^6.1.0
  share_plus: ^10.1.4
  reorderable_grid: ^1.0.13
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
