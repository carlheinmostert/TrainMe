<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#ffffff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">

  <!-- Open Graph / WhatsApp link preview -->
  <!-- TODO_SUPABASE: Populate these dynamically via edge function or SSR -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Your Exercise Plan — HomeFit">
  <meta property="og:description" content="Open your personalized exercise plan">
  <meta property="og:image" content="https://placeholder.trainme.app/og-card.png">
  <meta property="og:url" content="">
  <meta property="og:site_name" content="HomeFit Studio">

  <title>TrainMe - Exercise Plan</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <!-- Loading state -->
  <div id="loading" class="loading-screen">
    <div class="loading-content">
      <div class="loading-mark">T</div>
      <p class="loading-text">Loading your plan...</p>
    </div>
  </div>

  <!-- Error state -->
  <div id="error" class="error-screen" hidden>
    <div class="error-content">
      <div class="error-icon">!</div>
      <h2 class="error-title">Plan not found</h2>
      <p class="error-text">This link may have expired or the plan may no longer be available. Contact your practitioner for a new link.</p>
    </div>
  </div>

  <!-- Main app -->
  <div id="app" hidden>
    <!-- Header -->
    <header class="header">
      <div class="header-inner">
        <div class="header-brand">TrainMe</div>
        <div class="header-meta">
          <span id="client-name" class="header-client"></span>
        </div>
      </div>
    </header>

    <!-- Plan title bar -->
    <div class="plan-bar">
      <h1 id="plan-title" class="plan-title"></h1>
      <div id="progress" class="progress-label"></div>
    </div>

    <!-- Progress track -->
    <div class="progress-track">
      <div id="progress-fill" class="progress-fill"></div>
    </div>

    <!-- Card viewport -->
    <main id="card-viewport" class="card-viewport">
      <div id="card-track" class="card-track">
        <!-- Cards injected by JS -->
      </div>
    </main>

    <!-- Navigation -->
    <nav class="nav-bar">
      <button id="btn-prev" class="nav-btn nav-btn--prev" aria-label="Previous exercise" disabled>
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"></polyline>
        </svg>
        <span class="nav-btn-label">Prev</span>
      </button>

      <div class="nav-dots" id="nav-dots"></div>

      <button id="btn-next" class="nav-btn nav-btn--next" aria-label="Next exercise">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="9 18 15 12 9 6"></polyline>
        </svg>
        <span class="nav-btn-label">Next</span>
      </button>
    </nav>

    <!-- Footer -->
    <footer class="footer">
      <p class="footer-text">Prepared for you by your biokineticist</p>
    </footer>
  </div>

  <script src="/app.js"></script>
</body>
</html>
