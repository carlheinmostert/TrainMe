<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0F1117">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <!-- Open Graph / WhatsApp link preview -->
  <!-- TODO_SUPABASE: Populate these dynamically via edge function or SSR -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Your Exercise Plan — homefit.studio">
  <meta property="og:description" content="Open your personalized exercise plan">
  <meta property="og:image" content="https://placeholder.trainme.app/og-card.png">
  <meta property="og:url" content="">
  <meta property="og:site_name" content="homefit.studio">

  <title>homefit.studio - Exercise Plan</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <!-- Loading state -->
  <div id="loading" class="loading-screen">
    <div class="loading-content">
      <div class="loading-mark">
        <svg class="pulse-mark" viewBox="0 0 52 36" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M2.6 25.2 L13 25.2 L18.2 7.2 L26 28.8 L33.8 7.2 L39 25.2 L49.4 25.2"
                fill="none" stroke="currentColor" stroke-width="2.5"
                stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <p class="loading-text">Loading your plan...</p>
    </div>
  </div>

  <!-- Error state -->
  <div id="error" class="error-screen" hidden>
    <div class="error-content">
      <div class="error-icon">!</div>
      <h2 class="error-title">Plan not found</h2>
      <p class="error-text">This link may have expired or the plan may no longer be available. Contact your practitioner for a new link.</p>
    </div>
  </div>

  <!-- Main app ===============================================================
       Top-stack v2.2 layout (Wave 19.3 — 2026-04-22):
         Row 1  plan-bar                 (plan-title + header-client)
         Row 2  active-slide-header      (name · grammar — trailing parens retired)
         Row 3  workout-timeline-bar     (start ─── MM:SS total ─── ~finish)
         Row 4  progress-matrix          (duration-weighted pills in
                                          fullscreen; row-first circuits)
         Hero   card-viewport            (video fills; all chrome overlaid)
         Footer footer                   (powered by homefit.studio)
       Retired in prior waves: matrix-eta (3-number row — dismantled in
       19.2), nav-dots, peek-panel, treatment-seg, card-position, nav-bar,
       swipe-hint. Wave 19.3 relocations: timeline-bar dropped below the
       active-slide-header, remaining-total moved into its centre slot. -->
  <div id="app" hidden>
    <!-- Plan title bar -->
    <div class="plan-bar">
      <div class="plan-bar-left">
        <h1 id="plan-title" class="plan-title"></h1>
        <span id="client-name" class="header-client"></span>
      </div>
      <div id="progress" class="progress-label"></div>
    </div>

    <!-- Active-slide header — single-line row: "{name} · {grammar}". Wave
         19.3: the title's trailing "(MM:SS)" parenthetical is gone — the
         remaining-total moved into the centred slot of the timeline strip
         (which now lives directly above the matrix). Per-pill durations
         still carry the per-slide number. -->
    <div class="active-slide-header" id="active-slide-header">
      <h2 class="active-slide-title" id="active-slide-title"></h2>
    </div>

    <!-- Workout timeline strip — thin row above the progress matrix.
         Start wall-clock left-aligned, live remaining-total centred, and
         projected finish wall-clock right-aligned, all connected by a
         hairline rule. Before Start Workout the edges show "--:--" and
         the centre shows "0:00" so the row doesn't reflow on kickoff. -->
    <div class="workout-timeline-bar" id="workout-timeline-bar" aria-label="Workout timeline">
      <span class="workout-timeline-start" id="workout-timeline-start">--:--</span>
      <span class="workout-timeline-rule" aria-hidden="true"></span>
      <span class="workout-timeline-total" id="workout-timeline-total">0:00</span>
      <span class="workout-timeline-rule" aria-hidden="true"></span>
      <span class="workout-timeline-end" id="workout-timeline-end">--:--</span>
    </div>

    <!-- Progress-pill matrix — horizontally scrolling grid of exercise
         pills. Auto-centres on the active pill. Circuits render as a
         row-first grid: each row is one round (all exercises L→R), and
         rounds stack downward with a coral tint band per row. Wave 19.3:
         in fullscreen each pill's width is duration-weighted via
         `--pill-weight` / `--circuit-weight` custom properties.
         See docs/design/mockups/progress-pills.html. -->
    <div class="progress-matrix" id="progress-matrix">
      <div class="progress-matrix-inner" id="progress-matrix-inner"></div>
      <div class="progress-matrix-chevron" id="progress-matrix-chevron" hidden>
        <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="8 3 4 6 8 9"/>
        </svg>
      </div>
    </div>

    <!-- Card viewport — the hero region. All chrome is overlaid on top
         of the video: chevron nav (left/right edges), mute + fullscreen
         toggles (top-right), notes (bottom), prep countdown + pause disc
         (centered). -->
    <main id="card-viewport" class="card-viewport">
      <div id="card-track" class="card-track">
        <!-- Cards injected by JS -->
      </div>

      <!-- Edge chevron nav — subtle coral, mid-height over the video.
           Swipe still works on touch; these are the visible affordance. -->
      <button id="btn-prev" class="edge-nav edge-nav--prev" aria-label="Previous exercise" disabled>
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"></polyline>
        </svg>
      </button>
      <button id="btn-next" class="edge-nav edge-nav--next" aria-label="Next exercise">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="9 18 15 12 9 6"></polyline>
        </svg>
      </button>

      <!-- Fullscreen toggle (top-right; mute sits beside it, rendered
           per-slide inside the active card). -->
      <button id="btn-fullscreen" class="fullscreen-toggle" aria-label="Enter fullscreen" aria-pressed="false">
        <svg class="fs-icon-enter" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="4 9 4 4 9 4"/>
          <polyline points="20 9 20 4 15 4"/>
          <polyline points="4 15 4 20 9 20"/>
          <polyline points="20 15 20 20 15 20"/>
        </svg>
        <svg class="fs-icon-exit" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" hidden>
          <polyline points="9 4 9 9 4 9"/>
          <polyline points="15 4 15 9 20 9"/>
          <polyline points="9 20 9 15 4 15"/>
          <polyline points="15 20 15 15 20 15"/>
        </svg>
      </button>

      <!-- Playback settings (top-right; sits to the left of the fullscreen
           toggle). Opens a small popover with per-device preferences —
           currently just the segmented-background effect toggle (Milestone
           P), shaped to grow into a broader playback-settings surface
           (inter-set rest, etc.) without needing new chrome. -->
      <button id="btn-settings" class="settings-toggle" aria-label="Playback settings" aria-haspopup="dialog" aria-expanded="false">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>

      <!-- Playback-settings popover. Anchored just below the settings
           button (top-right area of the card viewport). Hidden by default;
           toggled visible via [data-open="true"]. Copy follows
           docs/design/project/voice.md — short label up top, a
           one-line "what this does" helper beneath the switch. -->
      <div id="settings-popover" class="settings-popover" role="dialog" aria-labelledby="settings-popover-title" hidden>
        <div class="settings-popover-title" id="settings-popover-title">Playback</div>
        <label class="settings-row" for="toggle-segmented-effect">
          <span class="settings-row-main">
            <span class="settings-row-label">Enhanced background</span>
            <span class="settings-row-hint" id="toggle-segmented-effect-hint">Body in focus — background dimmed</span>
          </span>
          <span class="settings-switch">
            <input type="checkbox" id="toggle-segmented-effect" class="settings-switch-input" checked>
            <span class="settings-switch-track" aria-hidden="true">
              <span class="settings-switch-thumb"></span>
            </span>
          </span>
        </label>
      </div>

      <!-- Rest countdown — big coral number overlaid on the last visible
           frame during rest slides. Reuses .prep-overlay-number styling. -->
      <div id="rest-countdown-overlay" class="rest-countdown-overlay" hidden>
        <div class="rest-countdown-number" id="rest-countdown-number">0</div>
      </div>

      <!-- Card notes — optional practitioner note, overlaid at the bottom
           of the video as plain coral text (no box). 3-line clamp; tap to
           expand. Populated by app.js per active slide. -->
      <button id="card-notes" class="card-notes-overlay" type="button" hidden aria-expanded="false">
        <span class="card-notes-text" id="card-notes-text"></span>
      </button>
    </main>

    <!-- Workout complete overlay -->
    <div id="workout-complete" class="workout-complete" hidden>
      <div class="workout-complete-inner">
        <div class="workout-complete-glow" aria-hidden="true"></div>
        <div class="workout-complete-icon" id="workout-complete-icon">
          <svg viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="24" cy="24" r="20"/>
            <polyline points="16 24 22 30 32 18"/>
          </svg>
        </div>
        <div class="workout-complete-title">Workout Complete!</div>
        <div id="workout-total-time" class="workout-complete-time">Total time: 0:00</div>
        <button id="workout-close-btn" class="workout-close-btn">Close</button>
      </div>
    </div>

    <!-- Start Workout button (centered over the video as CTA) -->
    <button id="start-workout-btn" class="start-workout-btn" hidden>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/>
        <polyline points="12 6 12 12 16 14"/>
      </svg>
      Start Workout
    </button>

    <!-- Legacy timer overlay stub — kept hidden so pre-parity call sites
         no-op instead of throwing on querySelector lookups. -->
    <div id="timer-overlay" hidden></div>

    <!-- Footer — HomefitLogo v2 (a slice of the progress-pill matrix) +
         "powered by homefit.studio" wordmark. Stays at the very bottom. -->
    <footer class="footer">
      <div class="footer-brand">
        <span class="footer-preamble">powered by</span>
        <div class="footer-logo" id="footer-logo">
          <!-- SVG injected by buildHomefitLogo() at init time. -->
          <span class="homefit-logo-wordmark">homefit.studio</span>
        </div>
      </div>
    </footer>
  </div>

  <!-- Data-access layer — MUST load before app.js. The web player's entire
       Supabase surface lives in api.js; app.js is forbidden from calling
       fetch('.../rest/v1/...') directly. See docs/DATA_ACCESS_LAYER.md. -->
  <script src="/api.js"></script>
  <script src="/app.js"></script>
</body>
</html>
